# fly.toml app configuration file generated for app-proud-moon-8040 on 2026-04-14T13:15:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: raqib-app:latest
    container_name: raqib
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - BIND=0.0.0.0
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
