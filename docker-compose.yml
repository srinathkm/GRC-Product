# Optional: use macvlan so the container has its own static IP on the LAN.
# 1. Set parent to your host's main interface (e.g. eth0 on Linux, not en0 on macOS - macvlan needs Linux).
# 2. Set subnet/gateway to match your LAN (e.g. 192.168.1.0/24, gateway 192.168.1.1).
# 3. Pick a static IP outside your DHCP range (e.g. 192.168.1.100).
# 4. Uncomment the "networks" section below and remove "ports" so the container is reached only at its macvlan IP.
# 5. Create the network once: docker network create -d macvlan -o parent=eth0 --subnet=192.168.1.0/24 --gateway=192.168.1.1 raqib-macvlan
#    Then in this file use: networks: raqib-macvlan: { external: true } and assign ipv4_address under the app service.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: raqib-app:latest
    container_name: raqib
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - BIND=0.0.0.0
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Uncomment below to use macvlan (create external network first - see DEPLOY.md).
    # networks:
    #   raqib-macvlan:
    #     ipv4_address: 192.168.1.100

# networks:
#   raqib-macvlan:
#     external: true
